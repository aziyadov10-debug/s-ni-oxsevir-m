<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sənin Üçün Sürpriz var! ❤️</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            position: relative;
        }
        h1 {
            color: #d63031;
            font-size: 24px;
        }
        p {
            font-size: 18px;
            color: #4d4d4d;
        }
        .buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }
        #yesBtn:hover {
            background-color: #27ae60;
            transform: scale(1.1);
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
        }
        .message-box {
            display: none;
        }
        .heart {
            font-size: 50px;
            color: #e74c3c;
            animation: beat .25s infinite alternate;
            transform-origin: center;
        }
        @keyframes beat{
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container" id="gameBox">
        <div class="heart">❤️</div>
        <h1 id="question">Məni sevirsən? 😊</h1>
        <div class="buttons" id="btnContainer">
            <button id="yesBtn" onclick="selectYes()">Hə 😍</button>
            <button id="noBtn" onmouseover="moveNoButton()">Yox 😜</button>
        </div>
    </div>

    <div class="container message-box" id="resultBox">
        <div class="heart">💖✨💖</div>
        <h1>Mən də Səni Çox Sevirəm! 🥰</h1>
        <!-- Bura öz ürək sözlərini yaza bilərsən -->
        <p>Həyatımda olduğun hər gün üçün sənə təşəkkür edirəm. Sən mənim başıma gələn ən gözəl şeysən. Yaxşı ki varsan, dünyam! 🌹</p>
    </div>

    <script>
        function moveNoButton() {
            const noBtn = document.getElementById('noBtn');
            const container = document.getElementById('gameBox');
            
            // Düymənin qaçacağı hüdudları təyin edirik
            const maxX = container.clientWidth - noBtn.clientWidth - 20;
            const maxY = container.clientHeight - noBtn.clientHeight - 20;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            document.getElementById('gameBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>
</body>
</html>
